<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Small-batch specialty coffee roasted with care in Buenos Aires. Every cup is a ceremony of flavor and craft."
    />
    <meta name="theme-color" content="#2C1810" />

    <!-- Open Graph — static fallbacks; SeoHead hydrates absolute og:image at runtime -->
    <meta property="og:title" content="Aroma Vivo — Specialty Coffee &amp; Artisan Roasters" />
    <meta
      property="og:description"
      content="Small-batch specialty coffee roasted with care. Every cup tells a story — let coffee speak before your first sip."
    />
    <meta property="og:url" content="https://cafeteria-soft-template.vercel.app/" />
    <link rel="canonical" href="https://cafeteria-soft-template.vercel.app/" />
    <meta property="og:image" content="https://cafeteria-soft-template.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aroma Vivo — Specialty Coffee &amp; Artisan Roasters" />
    <meta
      name="twitter:description"
      content="Small-batch specialty coffee roasted with care. Every cup tells a story — let coffee speak before your first sip."
    />
    <meta name="twitter:image" content="https://cafeteria-soft-template.vercel.app/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" as="image" href="/images/hero-bg.jpg" fetchpriority="high" />

    <title>Aroma Vivo — Specialty Coffee</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
